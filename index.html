<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bảng giá STP - Compact</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e1e2f">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body{font-family:Segoe UI;margin:0;background:#1e1e2f;color:#fff;}
.container{max-width:600px;margin:auto;padding:10px;}
h2{text-align:center;margin-bottom:10px;}
button{border:none;border-radius:6px;margin-top:5px;font-size:14px;cursor:pointer}
.add{background:#1cc88a;color:#fff;}
.tool{background:#4e73df;color:#fff;}
.del{background:#e74a3b;color:#fff;}
.total{text-align:right;font-size:18px;margin-top:8px;font-weight:bold}
.tab-btn{padding:6px 12px;margin-right:5px;font-weight:bold;}
.tab-active{background:#ffb400;color:#000;}
.tab-inactive{background:#6c757d;color:#fff;}
.card{display:flex;align-items:center;gap:4px;background:#2a2a40;padding:4px;border-radius:6px;margin-bottom:4px;font-size:13px;min-height:40px;}
.card select, .card input.price{flex:1 1 35%;min-width:50px;padding:3px;font-size:13px;}
.card input[type="number"]{flex:1 1 15%;min-width:30px;padding:3px;font-size:13px;}
.card .rowTotal{flex:1 1 25%;text-align:right;font-weight:bold;}
.card button.del{flex:1 1 10%;min-width:30px;padding:2px 4px;font-size:12px;}
@media (min-width: 769px){
  .card{display:flex;flex-wrap:nowrap;gap:10px;padding:12px;font-size:16px;}
  .card select{width:180px;}
  .card input{width:90px;}
  .price{width:120px;}
  .rowTotal{width:140px;font-weight:bold;}
  .del{width:auto;padding:8px 12px;font-size:16px;}
}
</style>
</head>
<body>

<div class="container">
<h2>BẢNG GIÁ QUẢNG CÁO STP</h2>
<div style="text-align:center;margin-bottom:8px;">
  <button class="tab-btn tab-active" id="tabKT" onclick="switchTab('KT')">KT</button>
  <button class="tab-btn tab-inactive" id="tabGT" onclick="switchTab('GT')">GT</button>
</div>
<div id="list"></div>

<button class="add" onclick="add()">➕ Thêm</button>
<button class="tool" id="toggleBtn" onclick="togglePrice()">🔐 Mở giá</button>
<button class="tool" onclick="resetAll()">🧹 Reset</button>

<div class="total" id="total">0 đ</div>
</div>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}

// Giá KT
const PRICE_KT={
  bat_trang:60000,bat_xam:70000,bat_thuong_in_uv:130000,
  bat_xam_thuong_in_uv:160000,bat_KG_in_thuong:130000,
  bat_UV_ko_xuyen_den:220000,bat_UV_xuyen_den:280000,
  decal_pipi_can_man:150000,decal_be:220000,
  decal_trang_trong_pipi_UV:200000,decal_trang_trong_UV_be:270000,
  decal_den_UV:200000,
  DC_form_3mm:390000,DC_form_5mm:470000,
  DC_Alu:520000,Canvas_UV:250000,Backlist:250000,
  form3mm:240000,form5mm:320000,form8mm:380000,
};

// Giá GT mới
const PRICE_GT={
  bat_trang:55000,bat_xam:65000,bat_thuong_in_uv:120000,
  bat_xam_thuong_in_uv:150000,bat_KG_in_thuong:120000,
  bat_UV_ko_xuyen_den:210000,bat_UV_xuyen_den:270000,
  decal_pipi_can_man:140000,decal_be:200000,
  decal_trang_trong_pipi_UV:190000,decal_trang_trong_UV_be:260000,
  decal_den_UV:190000,
  DC_form_3mm:350000,DC_form_5mm:400000,
  DC_Alu:520000,Canvas_UV:250000,Backlist:250000,
  form3mm:240000,form5mm:320000,form8mm:380000,
};

let unlocked=false;
let currentTab='KT';

function f(n){return Number(n||0).toLocaleString("vi-VN")+" đ";}

function showPrice(input){
  if(unlocked){
    input.value = f(input.dataset[currentTab]||0);
    input.removeAttribute("readonly");
  }else{
    input.value = "****";
    input.setAttribute("readonly",true);
  }
}

function enablePriceEdit(input){
  input.onfocus=function(){if(!unlocked) return; this.value=this.dataset[currentTab]||"";};
  input.oninput=function(){if(!unlocked) return; this.value=this.value.replace(/\D/g,''); this.dataset[currentTab]=this.value||0; calculate();};
  input.onblur=function(){if(!unlocked) return; this.dataset[currentTab]=this.value||0; this.value=f(this.dataset[currentTab]); save();};
}

function add(data={}){
  let div=document.createElement("div");
  div.className="card";

  // LIST giống nhau cho cả KT và GT
  div.innerHTML=`
  <select onchange="setPrice(this)">
    <optgroup label="BẠT">
      <option value="bat_trang">Bạt trắng</option>
      <option value="bat_xam">Bạt xám</option>
      <option value="bat_thuong_in_uv">Bạt thường in UV</option>
      <option value="bat_xam_thuong_in_uv">Bạt xám thường in UV</option>
      <option value="bat_KG_in_thuong">Bạt KG in thường</option>
      <option value="bat_UV_ko_xuyen_den">Bạt KG UV không xuyên đèn</option>
      <option value="bat_UV_xuyen_den">Bạt KG UV xuyên đèn</option>
    </optgroup>
    <optgroup label="DECAL">
      <option value="decal_pipi_can_man">Decal/pipi cán màng</option>
      <option value="decal_be">Decal bế</option>
      <option value="decal_trang_trong_pipi_UV">Decal trắng/trong/pipi UV</option>
      <option value="decal_trang_trong_UV_be">Decal trắng/trong UV bế</option>
      <option value="decal_den_UV">Decal đen UV</option>
    </optgroup>
    <optgroup label="DC DÁN">
      <option value="DC_form_3mm">Form 3mm + Decal</option>
      <option value="DC_form_5mm">Form 5mm + Decal</option>
      <option value="DC_Alu">Alu + Decal</option>
    </optgroup>
    <optgroup label="FORM">
      <option value="form3mm">Form 3mm</option>
      <option value="form5mm">Form 5mm</option>
      <option value="form8mm">Form 8mm</option>
    </optgroup>
    <optgroup label="KHÁC">
      <option value="Canvas_UV">Canvas UV</option>
      <option value="Backlist">Backlist Film</option>
    </optgroup>
  </select>

  <input type="number" placeholder="Rộng" value="${data.w||''}" oninput="save()">
  <input type="number" placeholder="Cao" value="${data.h||''}" oninput="save()">
  <input type="number" value="${data.qty||1}" oninput="save()">
  <input class="price">
  <div class="rowTotal">0 đ</div>
  <button class="del" onclick="del(this)">X</button>
  `;

  document.getElementById("list").appendChild(div);

  if(data.type) div.querySelector("select").value=data.type;

  let priceInput = div.querySelector(".price");
  enablePriceEdit(priceInput);

  // Cập nhật giá theo KT và GT
  let selectVal = div.querySelector("select").value;
  priceInput.dataset.KT = PRICE_KT[selectVal] || 0;
  priceInput.dataset.GT = PRICE_GT[selectVal] || 0;

  showPrice(priceInput);
  calculate();
}

function setPrice(select, doSave=true){
  let card=select.closest(".card");
  let input=card.querySelector(".price");
  let val = select.value;
  input.dataset.KT = PRICE_KT[val] || 0;
  input.dataset.GT = PRICE_GT[val] || 0;
  showPrice(input);
  if(doSave) save();
}

function calculate(){
  let total=0;
  document.querySelectorAll(".card").forEach(card=>{
    let inputs=card.querySelectorAll("input");
    let w=Number(inputs[0].value)||0;
    let h=Number(inputs[1].value)||0;
    let qty=Number(inputs[2].value)||1;
    let p=Number(card.querySelector(".price").dataset[currentTab])||0;
    let m2=(w*h)/1000000;
    let t=m2*p*qty;
    card.querySelector(".rowTotal").innerText=f(t);
    total+=t;
  });
  document.getElementById("total").innerText=f(total);
}

function del(btn){btn.closest(".card").remove(); save();}
function togglePrice(){unlocked=!unlocked; document.querySelectorAll(".price").forEach(p=>showPrice(p)); document.getElementById("toggleBtn").innerText=unlocked?"🔒 Đóng giá":"🔐 Mở giá";}
function resetAll(){if(confirm("Xóa hết dữ liệu?")){localStorage.clear(); location.reload();}}
function save(){
  let data=[];
  document.querySelectorAll(".card").forEach(card=>{
    let inputs=card.querySelectorAll("input");
    let priceInput = card.querySelector(".price");
    data.push({
      type:card.querySelector("select").value,
      w:inputs[0].value,
      h:inputs[1].value,
      qty:inputs[2].value,
      KT:priceInput.dataset.KT||0,
      GT:priceInput.dataset.GT||0
    });
  });
  localStorage.setItem("data",JSON.stringify(data));
  calculate();
}

function switchTab(tab){
  currentTab=tab;
  document.getElementById("tabKT").className = tab==='KT'?'tab-btn tab-active':'tab-btn tab-inactive';
  document.getElementById("tabGT").className = tab==='GT'?'tab-btn tab-active':'tab-btn tab-inactive';
  document.querySelectorAll(".price").forEach(p=>showPrice(p));
  calculate();
}

window.onload=()=>{
  let data=JSON.parse(localStorage.getItem("data")||"[]");
  if(data.length){data.forEach(d=>add(d));}else{add();}
};
</script>

</body>
</html>
